data:
  name: PerturbationDataModule
  kwargs:
    toml_config_path: examples/aws_gpu_retrieve.toml
    embed_key: X_hvg
    output_space: all
    pert_rep: onehot
    basal_rep: sample
    num_workers: 12
    pin_memory: true
    n_basal_samples: 1
    downsample: null
    downsample_cells: null
    additional_obs: []
    basal_mapping_strategy: random
    should_yield_control_cells: true
    batch_col: batch_var
    pert_col: target_gene
    cell_type_key: cell_type
    control_pert: TARGET1
    map_controls: true
    perturbation_features_file: null
    store_raw_basal: false
    int_counts: false
    barcode: true
    use_consecutive_loading: false
    val_subsample_fraction: 1.0
  output_dir: null
  debug: true
model:
  name: state
  checkpoint: null
  device: cuda
  kwargs:
    cell_set_len: 64
    blur: 0.05
    hidden_dim: 672
    loss: energy
    confidence_head: false
    n_encoder_layers: 4
    n_decoder_layers: 4
    predict_residual: true
    softplus: true
    freeze_pert_backbone: false
    transformer_decoder: false
    finetune_vci_decoder: false
    residual_decoder: false
    batch_encoder: false
    mask_attn: false
    use_effect_gating_token: false
    use_basal_projection: false
    distributional_loss: energy
    gene_decoder_bool: false
    init_from: null
    mmd_num_chunks: 1
    randomize_mmd_chunks: false
    transformer_backbone_key: llama
    transformer_backbone_kwargs:
      bidirectional_attention: true
      max_position_embeddings: 64
      hidden_size: 672
      intermediate_size: 2688
      num_hidden_layers: 4
      num_attention_heads: 8
      num_key_value_heads: 8
      head_dim: 84
      use_cache: false
      attention_dropout: 0.0
      hidden_dropout: 0.0
      layer_norm_eps: 1.0e-06
      pad_token_id: 0
      bos_token_id: 1
      eos_token_id: 2
      tie_word_embeddings: false
      rotary_dim: 0
      use_rotary_embeddings: false
    lora:
      enable: false
      r: 16
      alpha: 32
      dropout: 0.05
      bias: none
      target: auto
      adapt_mlp: false
      task_type: FEATURE_EXTRACTION
      merge_on_eval: false
training:
  wandb_track: true
  weight_decay: 0.0005
  batch_size: 4
  lr: 0.0001
  max_steps: 25
  train_seed: 42
  val_freq: 10
  ckpt_every_n_steps: 10
  gradient_clip_val: 10
  gradient_accumulation_steps: 1
  loss_fn: mse
  devices: 1
  strategy: auto
  use_mfu: false
  mfu_kwargs:
    available_flops: 60000000000000.0
    use_backward: true
    logging_interval: 10
    window_size: 2
  cumulative_flops_use_backward: true
wandb:
  entity: your_entity_name
  project: state
  local_wandb_dir: ./wandb_logs
  tags: []
name: aws_retrieve_smoke
output_dir: /home/ubuntu/state-runs
use_wandb: false
overwrite: false
return_adatas: false
pred_adata_path: null
true_adata_path: null
